# https://nixpacks.com/docs/configuration/file

# Setup environment variables
[variables]
    NPM_CONFIG_UPDATE_NOTIFIER = "false"
    NPM_CONFIG_FUND = "false"
    NODE_OPTIONS = "--max-old-space-size=512"  # Batasi penggunaan memori Node.js

# Install packages yang dibutuhkan
[phases.setup]
    nixPkgs = ["...", "jq"]  # jq untuk membaca outputPath dari angular.json

# Install Caddy dari Nix
[phases.caddy]
    dependsOn = ["setup"]
    nixpkgsArchive = "ba913eda2df8eb72147259189d55932012df6301"  # Caddy v2.8.4
    nixPkgs = ["caddy"]

# Format Caddyfile agar rapi
[phases.fmt]
    dependsOn = ["caddy"]
    cmds = ["caddy fmt --overwrite Caddyfile"]

# Build Angular dan jalankan Caddy sebagai server
[start]
    cmd = '''
        export ANGULAR_OUTPUT_PATH=$(jq -r "[.projects[] | .architect.build.options.outputPath][0]" angular.json) &&
        ng build --configuration=production &&
        exec caddy run --config Caddyfile --adapter caddyfile 2>&1
    '''
